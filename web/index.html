<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>StatusVault — Your Personal Immigration Document Expiry Tracker</title>
    <!-- GitHub Pages SPA: restore path encoded by 404.html -->
    <script>
      (function() {
        var params = new URLSearchParams(window.location.search);
        var p = params.get('p');
        if (p) {
          var h = params.get('h') || '';
          window.history.replaceState(null, null, decodeURIComponent(p) + decodeURIComponent(h));
        }
      })();
    </script>
    <meta name="description" content="Never miss a visa or document expiry. StatusVault tracks your immigration documents, sends timely alerts, and keeps your status secure — 100% private, AES-256 encrypted." />
    <meta name="application-name" content="StatusVault" />
    <meta property="og:title" content="StatusVault — Immigration Document Tracker" />
    <meta property="og:description" content="Track visas, passports, work permits and travel history. Private, encrypted, always up to date." />
    <style>
      /* Force root to fill full browser viewport */
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #0A1628;
      }

      /* React Native Web root div must fill viewport */
      #root {
        display: flex;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      /* Remove default button/input browser styles */
      button { cursor: pointer; border: none; background: none; }
      input, textarea { outline: none; }

      /* Smooth scrolling in scroll containers */
      * { -webkit-overflow-scrolling: touch; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Legal footer — always visible for Google OAuth verification and crawlers -->
    <div id="legal-footer" style="position:fixed;bottom:0;left:0;right:0;z-index:9999;background:rgba(10,15,30,0.92);backdrop-filter:blur(8px);padding:8px 20px;display:flex;align-items:center;justify-content:center;gap:20px;font-family:system-ui,sans-serif;font-size:12px;border-top:1px solid rgba(255,255,255,0.08);">

      <a href="https://www.statusvault.org/privacy" style="color:rgba(165,180,252,0.7);text-decoration:none;">Privacy Policy</a>
      <span style="color:rgba(255,255,255,0.15)">·</span>
      <a href="https://www.statusvault.org/terms" style="color:rgba(165,180,252,0.7);text-decoration:none;">Terms of Service</a>
      <span style="color:rgba(255,255,255,0.15)">·</span>
      <span style="color:rgba(203,213,225,0.35);">Not affiliated with USCIS</span>
