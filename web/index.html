<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Favicons / App Icons — cache-busted so browsers pick up new versions -->
    <link rel="icon" type="image/png" href="/favicon.png?v=2" />
    <link rel="shortcut icon" href="/favicon.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png?v=2" />
    <meta name="theme-color" content="#0A1530" />

    <title>StatusVault — Your Personal Immigration Document Expiry Tracker</title>
    <meta name="description" content="Never miss a visa or document expiry. StatusVault tracks your immigration documents, sends timely alerts, and keeps your status secure — 100% private, AES-256 encrypted." />
    <meta name="application-name" content="StatusVault" />
    <meta property="og:title" content="StatusVault — Immigration Document Tracker" />
    <meta property="og:description" content="Track visas, passports, work permits and travel history. Private, encrypted, always up to date." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.statusvault.org/" />
    <meta property="og:image" content="https://www.statusvault.org/og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="StatusVault — Immigration Document Tracker" />
    <meta name="twitter:description" content="Track visas, passports, work permits and travel history. Private, encrypted, always up to date." />
    <meta name="twitter:image" content="https://www.statusvault.org/og-image.png" />
    <link rel="canonical" href="https://www.statusvault.org/" />
    <style>
      /* Force root to fill full browser viewport */
      *, *::before, *::after { box-sizing: border-box; }

      html, body {
        width: 100%;
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
        background-color: #050B1C;
      }

      /* React Native Web root div must fill viewport */
      #root {
        display: flex;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
      }

      /* Remove default button/input browser styles */
      button { cursor: pointer; border: none; background: none; }
      input, textarea { outline: none; }

      /* Smooth scrolling in scroll containers */
      * { -webkit-overflow-scrolling: touch; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Privacy links for Google OAuth crawler verification — not visible to app users.
         Users access Privacy Policy and Terms via Settings → Legal inside the app. -->
    <div aria-hidden="true" style="position:absolute;width:1px;height:1px;overflow:hidden;opacity:0;pointer-events:none;">
      <a href="https://www.statusvault.org/privacy">Privacy Policy</a>
      <a href="https://www.statusvault.org/terms">Terms of Service</a>
    </div>
  </body>
</html>
