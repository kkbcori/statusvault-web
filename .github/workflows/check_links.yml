name: Monthly Link Health Check

on:
  # Runs on the 1st of every month at 9am UTC
  schedule:
    - cron: '0 9 1 * *'
  # Also allows manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  check-links:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run link checker
        id: check
        run: python3 scripts/check_links.py
        continue-on-error: true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: link-check-report-${{ github.run_id }}
          path: scripts/link_check_report.json
          retention-days: 90

      - name: Create GitHub Issue if broken links found
        if: steps.check.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('scripts/link_check_report.json', 'utf8'));
            const broken = report.results.filter(r => !r.ok);
            const redirected = report.results.filter(r => r.redirected);

            let body = `## 🔗 Link Health Check Report\n`;
            body += `**Checked:** ${report.checked_at}\n`;
            body += `**Total links:** ${report.total} | `;
            body += `**Broken:** ${report.broken_count} | `;
            body += `**Redirected:** ${report.redirect_count}\n\n`;

            if (broken.length > 0) {
              body += `### ❌ Broken Links (need fixing in \`VisaToolsScreen.tsx\`)\n\n`;
              broken.forEach(link => {
                body += `- **${link.label}**\n`;
                body += `  - URL: \`${link.url}\`\n`;
                body += `  - Error: ${link.error || link.status}\n\n`;
              });
            }

            if (redirected.length > 0) {
              body += `### ↪ Redirected Links (consider updating)\n\n`;
              redirected.forEach(link => {
                body += `- **${link.label}**\n`;
                body += `  - Old: \`${link.url}\`\n`;
                body += `  - New: \`${link.final_url}\`\n\n`;
              });
            }

            body += `\nUpdate the links in \`src/screens/VisaToolsScreen.tsx\` and close this issue.`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Link Check] ${report.broken_count} broken link(s) found — ${report.checked_at.split('T')[0]}`,
              body,
              labels: ['maintenance', 'content']
            });
